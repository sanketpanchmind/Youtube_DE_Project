# This is a Databricks asset bundle definition for youtube_de_project_bundle.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: youtube_de_project_bundle
  uuid: 5e4803f6-0915-49a4-88f6-bef0f163d518

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-8ff7f986-16ca.cloud.databricks.com
    variables:
      catalog: youtube_dev
      schema: dev
    presets:
      artifacts_dynamic_version: true
  prod:
    mode: production
    workspace:
      host: https://dbc-8ff7f986-16ca.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/sanket.panchmind1@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/sanket.panchmind1@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: youtube_prod
      schema: prod
    permissions:
      - user_name: sanket.panchmind1@gmail.com
        level: CAN_MANAGE
